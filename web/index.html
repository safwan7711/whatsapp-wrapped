<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
  <title>Chat Wrapped</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-dark text-white overflow-hidden">
  <div id="landing"
    class="active text-black d-flex flex-column justify-content-center align-items-center text-center w-100 h-100 position-absolute top-0 start-0 z-3">
    <h1 class="display-1 fw-bold mb-3">Whatsapp Wrapped</h1>
    <p class="lead mb-4">Are you ready to see how much y'all yapped?</p>
    <button id="start-btn" class="btn btn-lg btn-light fw-bold px-5 py-3 shadow">
      Start the Show
    </button>
  </div>
  <div id="slideshow" class="d-none flex-column w-100 h-100 position-absolute top-0 start-0 z-2">
    <div class="d-flex gap-2 px-3 pt-3 w-100 position-absolute top-0 start-0 z-3" id="progress-bar"></div>
    <div id="stats"
      class="d-flex flex-column justify-content-center align-items-center text-center h-100 p-4 slide-anim"></div>
  </div>

  <script src="app.js"></script>
</body>

</html>
